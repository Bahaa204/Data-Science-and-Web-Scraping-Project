name: Scrape Streaming Services Every 3 Hours

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ahmad branch
        uses: actions/checkout@v4
        with:
          ref: ahmad

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: python streaming_services_scrapper.py

      - name: Commit and push updated CSV
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add data/streaming_services.csv
          git commit -m "Updated Streaming Services data (3-hour intervals)"
          git push origin main
